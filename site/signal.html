<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signal &mdash; daily talk signal</title>
    <meta
      name="description"
      content="One slide or quote from the Punk Rock AI talk, surfaced for today. Same signal for every visitor on the same UTC day."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="canonical" href="https://www.punkrockai.com/signal" />
    <meta property="og:type" content="article" />
    <meta property="og:title" content="Signal — daily talk signal" />
    <meta property="og:description" content="One slide or quote from the talk, surfaced for today." />
    <meta property="og:url" content="https://www.punkrockai.com/signal" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:image" content="https://www.punkrockai.com/public/slides/neither-are-we.webp" />
    <meta name="twitter:image" content="https://www.punkrockai.com/public/slides/neither-are-we.webp" />
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/punk-graphics.css" />
    <link rel="stylesheet" href="/css/signal.css" />
    <link rel="stylesheet" href="/css/zine-overhaul.css" />
  </head>
  <body class="shell signal">
    <header class="site-header" data-include="header"></header>

    <main>
      <section class="signal-hero grain scanlines punk-tile hero--photo" id="signal" data-state="loading">
        <div class="hero__photo-layer" id="signal-photo-layer" aria-hidden="true"></div>
        <div class="hero__slide-layer" aria-hidden="true" style="background-image: url('/public/slides/bhf-bg-texture.webp');"></div>
        <span class="punk-splatter--red" style="--punk-x:82%;--punk-y:12%;--punk-scale:1.0;--punk-opacity:0.45;" aria-hidden="true"></span>
        <div class="wrap wrap--narrow">
          <p class="signal__eyebrow">
            <span class="signal__tag">Signal</span>
            <time class="signal__date" data-signal-date></time>
          </p>
          <h1 class="signal__title" data-signal-title>Signal of the day</h1>
          <p class="signal__act" data-signal-act></p>
          <p class="signal__note" data-signal-note hidden></p>
          <p class="signal__meta">
            <span data-signal-index></span>
          </p>
          <nav class="signal__nav" aria-label="Signal date navigation">
            <a class="signal__nav-link" data-signal-prev href="/signal">←</a>
            <a class="signal__nav-link signal__nav-link--today" data-signal-today href="/signal">Today</a>
            <a class="signal__nav-link" data-signal-next href="/signal">→</a>
          </nav>
          <p class="signal__cta">
            <a class="btn" data-signal-recap href="/recap#slides">Read the recap</a>
            <a class="btn btn--ghost" data-signal-talk href="/talk">See the full talk</a>
          </p>
        </div>
      </section>
    </main>

    <footer class="site-footer" data-include="footer"></footer>

    <script type="module" src="/js/common/header.js"></script>
    <script type="module" src="/js/signal.js"></script>
  </body>
</html>
