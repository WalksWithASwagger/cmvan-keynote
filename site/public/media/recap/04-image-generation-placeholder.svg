<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Video coming soon: time-lapse of slide image generation runs">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#2a2a2a"/>
    </linearGradient>
    <pattern id="grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#1a1a1a"/>
      <circle cx="1" cy="1" r="0.5" fill="#222"/>
      <circle cx="3" cy="3" r="0.5" fill="#0e0e0e"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grain)" opacity="0.4"/>
  <g transform="translate(800 380)" fill="#ff3b30">
    <polygon points="-60,-70 -60,70 70,0"/>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle" fill="#f5f5f5">
    <text x="800" y="540" font-size="42" letter-spacing="6">VIDEO COMING</text>
    <text x="800" y="600" font-size="22" fill="#9a9a9a" letter-spacing="3">04 &middot; image generation time-lapse</text>
    <text x="800" y="650" font-size="18" fill="#6a6a6a">slide regeneration runs &middot; cutting room floor</text>
  </g>
  <rect x="40" y="40" width="1520" height="820" fill="none" stroke="#3a3a3a" stroke-width="2" stroke-dasharray="8 8"/>
</svg>
