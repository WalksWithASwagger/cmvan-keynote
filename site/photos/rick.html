<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rick Photo Gallery &mdash; Punk Rock AI at Creative Mornings Vancouver</title>
    <meta
      name="description"
      content="Rick's 200-photo gallery from the Punk Rock AI talk at Creative Mornings Vancouver on May 1, 2026."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="canonical" href="https://www.punkrockai.com/photos/rick" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rick Photo Gallery — Punk Rock AI at Creative Mornings Vancouver" />
    <meta property="og:description" content="200 frames from the room where Punk Rock AI landed live." />
    <meta property="og:url" content="https://www.punkrockai.com/photos/rick" />
    <meta property="og:image" content="https://www.punkrockai.com/public/photos/rick/150.webp" />
    <meta name="twitter:image" content="https://www.punkrockai.com/public/photos/rick/150.webp" />
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/punk-graphics.css" />
    <link rel="stylesheet" href="/css/widgets/photos.css" />
    <link rel="stylesheet" href="/css/zine-overhaul.css" />
    <style>:root { --hero-photo: url('/public/photos/rick/150.webp'); }</style>
  </head>
  <body class="shell">
    <header class="site-header" data-include="header"></header>

    <main>
      <section class="pg-hero grain scanlines punk-tile pg-hero--punk hero--photo">
        <div class="hero__photo-layer" aria-hidden="true"></div>
        <div class="hero__slide-layer" aria-hidden="true" style="background-image: url('/public/slides/bhf-title-full.webp');"></div>
        <div class="wrap wrap--narrow">
          <p class="kicker kicker--accent">May 1, 2026 &middot; Creative Mornings Vancouver</p>
          <h1 style="color: var(--accent-pink); text-shadow: 4px 4px 0 rgba(0,0,0,.95), 0 0 20px rgba(255,61,138,.35);">Punk Rock AI &mdash; the room.</h1>
          <p class="pg-hero__lede">
            200 frames. One room. The talk as it happened.
          </p>
          <p class="pg-hero__credit">
            Photography by Rick / Creative Mornings Vancouver
          </p>
          <p class="pg-hero__credit">
            Follow the arc in the <a href="/recap">Punk Rock AI recap</a> or compare
            <a href="/photos/michelle-diamond">Michelle Diamond&rsquo;s gallery</a>.
          </p>
          <ul class="pg-stats">
            <li>
              <strong id="pg-total">&hellip;</strong>
              <span>photos</span>
            </li>
            <li>
              <strong id="pg-featured">&hellip;</strong>
              <span>featured</span>
            </li>
          </ul>
        </div>
      </section>

      <section class="pg-section">
        <div class="wrap">
          <ol class="pg-grid" id="pg-grid" data-slug="rick"></ol>
        </div>
      </section>
    </main>

    <dialog class="pg-lightbox" id="pg-lightbox" aria-label="Photo lightbox">
      <div class="pg-lightbox__head">
        <span class="pg-lightbox__num" data-lb-num></span>
        <a class="btn" data-lb-dl href="" download>Download</a>
        <button class="btn" type="button" data-lb-prev aria-label="Previous photo" style="border: 2px solid var(--accent-pink);">&larr;</button>
        <button class="btn" type="button" data-lb-next aria-label="Next photo" style="border: 2px solid var(--accent-pink);">&rarr;</button>
        <button class="btn" type="button" data-lb-close aria-label="Close lightbox" style="border: 2px solid var(--accent-pink);">Close (esc)</button>
      </div>
      <div class="pg-lightbox__stage">
        <img data-lb-img src="" alt="" />
      </div>
      <div class="pg-lightbox__foot">
        <p class="pg-lightbox__caption" data-lb-caption></p>
      </div>
    </dialog>

    <footer class="site-footer" data-include="footer"></footer>

    <script type="module" src="/js/common/header.js"></script>
    <script type="module" src="/js/widgets/photos.js"></script>
  </body>
</html>
