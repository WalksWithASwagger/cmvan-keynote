<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CMVan Photos &mdash; Michelle Diamond</title>
    <meta
      name="description"
      content="296 photos from the Punk Rock AI talk at Creative Mornings Vancouver, May 1 2026. Photography by Michelle Diamond."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta property="og:title" content="CMVan Photos — Michelle Diamond" />
    <meta property="og:description" content="296 frames. One room. The talk through Michelle Diamond's lens." />
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/punk-graphics.css" />
    <link rel="stylesheet" href="/css/widgets/photos.css" />
  </head>
  <body class="shell">
    <header class="site-header" data-include="header"></header>

    <main>
      <section class="pg-hero grain scanlines punk-tile pg-hero--punk">
        <div class="wrap wrap--narrow">
          <p class="kicker kicker--accent">May 1, 2026 &middot; Creative Mornings Vancouver</p>
          <h1>Punk Rock AI &mdash; Michelle Diamond.</h1>
          <p class="pg-hero__lede">
            296 frames. One room. The talk through Michelle Diamond&rsquo;s lens.
          </p>
          <p class="pg-hero__credit">
            Photography by <a href="https://michelledianephotography.com" target="_blank" rel="noopener">Michelle Diamond</a>
          </p>
          <ul class="pg-stats">
            <li>
              <strong id="pg-total">&hellip;</strong>
              <span>photos</span>
            </li>
            <li>
              <strong id="pg-featured">&hellip;</strong>
              <span>featured</span>
            </li>
          </ul>
        </div>
      </section>

      <section class="pg-section">
        <div class="wrap">
          <ol class="pg-grid" id="pg-grid" data-slug="michelle-diamond"></ol>
        </div>
      </section>
    </main>

    <dialog class="pg-lightbox" id="pg-lightbox" aria-label="Photo lightbox">
      <div class="pg-lightbox__head">
        <span class="pg-lightbox__num" data-lb-num></span>
        <a class="btn" data-lb-dl href="" download>Download</a>
        <button class="btn" type="button" data-lb-prev aria-label="Previous photo">&larr;</button>
        <button class="btn" type="button" data-lb-next aria-label="Next photo">&rarr;</button>
        <button class="btn" type="button" data-lb-close aria-label="Close lightbox">Close (esc)</button>
      </div>
      <div class="pg-lightbox__stage">
        <img data-lb-img src="" alt="" />
      </div>
      <div class="pg-lightbox__foot">
        <p class="pg-lightbox__caption" data-lb-caption></p>
      </div>
    </dialog>

    <footer class="site-footer" data-include="footer"></footer>

    <script type="module" src="/js/common/header.js"></script>
    <script type="module" src="/js/widgets/photos.js"></script>
  </body>
</html>
