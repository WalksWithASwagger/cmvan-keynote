<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

      name="description"
      content="Five quick questions. One concrete next move toward Release Day. The post-talk action chooser routes you straight back into the portal's tools."

    <meta name="twitter:image" content="https://www.punkrockai.com/public/slides/neither-are-we.webp" />
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="/css/layout.css" />

  <body class="shell">
    <header class="site-header" data-include="header"></header>

    <main>
      <section class="act-intro grain scanlines punk-tile punk-section--ship" style="position: relative; overflow: hidden;">
        <div class="section-slide-bg" aria-hidden="true" style="background-image: url('/public/slides/release-day-full.webp'); opacity: 0.07; mix-blend-mode: screen;"></div>
        <span class="punk-splatter" style="--punk-x:82%;--punk-y:18%;--punk-scale:1.3;--punk-opacity:0.55;" aria-hidden="true"></span>
        <div class="wrap wrap--narrow" style="position: relative; z-index: 1;">
          <p class="kicker kicker--accent">Post-talk &middot; pick one move toward Release Day</p>
          <h1 style="color: var(--accent-pink);">What now?</h1>
          <p class="act-intro__lede" id="act-intro-lede">
            The talk ended on a deadline. Five quick questions. One concrete
            next move. No homework, no inbox course, no maybe-later list.
          </p>
        </div>
      </section>

      <section class="act">
        <div class="wrap wrap--narrow">
          <div class="act__stage" id="act-stage" aria-live="polite"></div>
          <p class="act__status" id="act-status" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <footer class="site-footer" data-include="footer"></footer>

    <script type="module" src="/js/common/header.js"></script>
    <script type="module" src="/js/widgets/action.js"></script>
