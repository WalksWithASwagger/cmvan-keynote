<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Talk &mdash; Punk Rock AI</title>
    <meta
      name="description"
      content="Twenty minutes, seven acts, twenty-two slides. Every key line linkable, copyable, and quotable. The talk made into a working portal."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta property="og:type" content="article" />
    <meta property="og:title" content="The Talk — Punk Rock AI" />
    <meta property="og:description" content="Twenty minutes, seven acts, twenty-two slides. Every key line linkable, copyable, quotable." />
    <meta property="og:url" content="https://punkrockai.com/talk.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/widgets/slide-reel.css" />
  </head>
  <body class="shell">
    <header class="site-header" data-include="header"></header>

    <main>
      <section class="talk-intro grain scanlines">
        <div class="wrap">
          <p class="talk-intro__meta">20 min &middot; 7 acts &middot; 22 slides &middot; CMVan 01.05.2026</p>
          <div class="talk-intro__head">
            <h1>Both hands full.</h1>
            <span class="tag tag--accent">The Talk</span>
          </div>
          <p class="talk-intro__lede">
            Pick a slide. Pull a quote. Open the lightbox to step through the
            full sequence with the keyboard. Every key line below is linkable
            (right-click &rarr; copy link) and lives at its own anchor.
          </p>
          <nav class="act-rail" id="act-rail" aria-label="Acts"></nav>
        </div>
      </section>

      <section class="reel">
        <div class="wrap">
          <div id="slide-reel" aria-live="polite"></div>
        </div>
      </section>

      <section class="quote-wall">
        <div class="wrap">
          <div class="quote-wall__head">
            <h2>Quote wall</h2>
            <span class="kicker">19 lines &middot; nail these</span>
          </div>
          <div id="quote-wall"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer" data-include="footer"></footer>

    <dialog
      id="lightbox"
      class="lightbox"
      aria-label="Slide viewer"
      aria-describedby="lb-title"
    >
      <div class="lightbox__inner">
        <header class="lightbox__head">
          <span class="lightbox__num" data-lb-num></span>
          <span class="lightbox__act" data-lb-act></span>
          <button type="button" class="lightbox__close" data-lb-close>Close (esc)</button>
        </header>
        <div class="lightbox__stage">
          <div class="lightbox__content" data-lb-stage>
            <div class="lightbox__placeholder"><p></p></div>
          </div>
          <div class="lightbox__nav">
            <button type="button" data-lb-prev aria-label="Previous slide">&larr;</button>
            <button type="button" data-lb-next aria-label="Next slide">&rarr;</button>
          </div>
        </div>
        <footer class="lightbox__body">
          <h3 class="lightbox__title" id="lb-title" data-lb-title></h3>
          <ul class="lightbox__quotes" data-lb-quotes hidden></ul>
        </footer>
      </div>
    </dialog>

    <script type="module" src="/js/common/header.js"></script>
    <script type="module" src="/js/widgets/slide-reel.js"></script>
  </body>
</html>
