<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Library &mdash; Punk Rock AI</title>
    <meta
      name="description"
      content="Searchable knowledge base across the script, source material, dress rehearsal, and research. 60+ documents, one search box."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta property="og:title" content="Library — Punk Rock AI" />
    <meta property="og:description" content="Sixty-plus documents. One search box. The whole talk is in there." />
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/punk-graphics.css" />
    <link rel="stylesheet" href="/css/widgets/library.css" />
  </head>
  <body class="shell">
    <header class="site-header" data-include="header"></header>

    <main>
      <section class="lib-intro">
        <div class="wrap wrap--narrow">
          <p class="kicker kicker--accent">Library</p>
          <h1>The whole talk is in there.</h1>
          <p class="lib-intro__lede">
            Every script revision, every source essay, every research note,
            every audio cue. One search box. Client-side fuzzy match &mdash;
            no server.
          </p>
          <p class="lib-stats" id="lib-stats">indexing&hellip;</p>
        </div>
      </section>

      <section class="lib-search">
        <div class="wrap">
          <div class="lib-search__row">
            <input
              id="lib-search"
              class="lib-search__input"
              type="search"
              placeholder="search the library&hellip;"
              autocomplete="off"
              aria-label="Search the library"
            />
            <span class="lib-search__count" id="lib-count"></span>
          </div>
          <div class="lib-chips" id="lib-chips" role="group" aria-label="Filter by collection"></div>
        </div>
      </section>

      <div class="wrap">
        <ol class="lib-results" id="lib-results" aria-live="polite"></ol>
      </div>
    </main>

    <footer class="site-footer" data-include="footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js" defer></script>
    <script type="module" src="/js/common/header.js"></script>
    <script type="module" src="/js/widgets/library.js"></script>
  </body>
</html>
