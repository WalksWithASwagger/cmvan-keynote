# Cloudflare Pages fallback config for punkrockai.com.
# Production runs on Vercel. This stays at the repo root so a deliberate
# Cloudflare fallback deploy can mirror the static-site setup without guessing.

name = "punkrockai"
compatibility_date = "2026-04-01"
pages_build_output_dir = "site"

[vars]
# Ships into pages_functions if/when we add any. Not currently consumed.
SITE_NAME = "Punk Rock AI"
RELEASE_DAY = "2026-05-29"

# Worker projects under worker/* have their own wrangler.toml files.
# See worker/pattern-finder/wrangler.toml and worker/submissions/wrangler.toml.
