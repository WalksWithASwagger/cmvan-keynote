name: Eval

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: npm ci
      - run: python3 -m pip install pytest
      - run: npm run check
